[About]
Version=0.1
Author=Sergey Klimovich
Mail=Klimovich86@gmail.com

[Type]
Class=Element
Info=XML NativeAOT editor
Tab=XML

[Property]
Formatting=Save formatting: 0 compact, 1 indented|1|1
PreserveWhitespace=Preserve whitespace while loading XML|14|0|True,False
DtdProcessing=DTD mode: 0 prohibit, 1 ignore, 2 parse|1|0
MaxCharactersInDocument=Maximum XML characters while loading; 0 means unlimited|1|0
AutoNodeInfo=Automatically refresh and fire NodeInfoJson after load/select/edit operations|14|0|True,False

[Methods]
doLoadXmlString=Synchronously load XML text from XmlStringIn using secure XmlReader settings|1|0
*doLoadXmlFile=Synchronously load XML file from FilePathIn using secure XmlReader settings|1|0
*doCreateNewXml=Create a new document with root element RootNameIn|1|0
doSelectNodes=Select element nodes by XPathIn; QueryResult and SelectedCount receive match count|1|0
doSelectSingleNode=Select first element by XPathIn and make it current|1|0
doSetCurrentNode=Select current element by XPathIn without editing the document|1|0
doSelectByIndex=Make selected node at zero-based IndexIn current|1|0
doSelectNodePath=Select one element by simple NodePathIn and make it current; returns 1 or 0 in QueryResult|1|0
doPathExists=Check simple NodePathIn without changing the current node; returns PathExists and ResolvedNodePath|1|0
doEnsureNodePath=Create missing elements along simple NodePathIn and make the target current; QueryResult receives created count|1|0
doEnumSelectedNodes=Enumerate selected nodes; fires OnNode for each node and updates CurrentIndex|1|0
doGetValue=Read text value of the current element into NodeValue|1|0
doSetValue=Replace text value of the current element with NewValueIn|1|0
doGetPathValue=Read text value of element addressed by NodePathIn into NodeValue and make it current|1|0
doSetPathValue=Set text value of element addressed by NodePathIn from NewValueIn and make it current|1|0
doGetAttributeValue=Read AttributeNameIn from the current element into AttributeValue|1|0
doSetAttributeValue=Set AttributeNameIn to AttributeValueIn on the current element|1|0
doGetAttributeList=Return current element attributes as AttributeListJson|1|0
doEnumAttributes=Enumerate current element attributes; fires OnAttribute for each pair|1|0
doRemoveAttribute=Remove AttributeNameIn from the current element|1|0
doAddChildNode=Append empty child element named ChildNameIn and make it current|1|0
doAddChildXml=Append XML fragment from ChildXmlIn as a child and make it current|1|0
doDeleteNode=Delete current element; deleting the root clears the document|1|0
doGetNodeXml=Serialize current element into NodeXml using Formatting|1|0
doSetNodeXml=Replace current element with XML fragment from NodeXmlIn|1|0
doGetPathXml=Serialize element addressed by NodePathIn into NodeXml using Formatting and make it current|1|0
doSetPathXml=Replace element addressed by NodePathIn with XML fragment from NodeXmlIn and make it current|1|0
doDeletePath=Delete element addressed by NodePathIn; deleting the root clears the document|1|0
doSaveXmlToString=Serialize document into SavedXmlString using Formatting|1|0
*doSaveXmlToFile=Serialize document to FilePathIn as UTF-8 without BOM|1|0
doSetNamespacePrefix=Set XPath/name namespace mapping PrefixIn -> NamespaceUriIn|1|0
doSetNamespacesJson=Replace namespace mappings from NamespacesJsonIn object prefix-to-uri|1|0
doClearNamespaces=Clear all XPath/name namespace mappings|1|0
doGetBridgeInfo=Return NativeAOT bridge metadata and ABI contract into BridgeInfo|1|0
doGetNodeInfo=Refresh NodeInfoJson for the current node and fire OnNodeInfoRetrieved|1|0
doClose=Destroy the native XML session and clear LoadedXml|1|0

OnXmlLoaded=Fired after XML load or create completes|2|0
OnQueryExecuted=Fired after XPath query; emits QueryResult|2|2
OnCurrentNodeChanged=Fired when current node changes; emits CurrentNodePath|2|2
OnPathResolved=Fired after NodePath operations; emits ResolvedNodePath or empty string when not found|2|2
OnNode=Fired for every node during doEnumSelectedNodes; emits NodeXml|2|2
OnValueRetrieved=Fired after doGetValue; emits NodeValue|2|2
OnValueSet=Fired after doSetValue|2|0
OnAttributeRetrieved=Fired after doGetAttributeValue; emits AttributeValue|2|2
OnAttributeSet=Fired after doSetAttributeValue|2|0
OnAttributeRemoved=Fired after doRemoveAttribute|2|0
OnAttributeList=Fired after doGetAttributeList; emits AttributeListJson|2|2
OnAttribute=Fired for every attribute during doEnumAttributes; emits AttributeValue|2|2
OnNodeAdded=Fired after doAddChildNode or doAddChildXml|2|0
OnNodeDeleted=Fired after doDeleteNode|2|0
OnXmlSaved=Fired after save; emits SavedXmlString for doSaveXmlToString|2|2
OnNodeXmlRetrieved=Fired after doGetNodeXml; emits NodeXml|2|2
OnNodeXmlSet=Fired after doSetNodeXml|2|0
OnNamespacesChanged=Fired after namespace map changes|2|0
OnBridgeInfo=Fired after doGetBridgeInfo; emits BridgeInfo JSON|2|2
*OnError=Fired on bridge, XML, XPath, IO, JSON or state errors; emits ErrorMessage|2|2
OnNodeInfoRetrieved=Fired when NodeInfoJson is refreshed for current node|2|2
OnChanged=Fired after a document mutation|2|0
OnDone=Fired after each operation; emits 1 for success or 0 for failure|2|1

LoadedXml=Last XML text loaded directly or serialized after file load/create|3|2
QueryResult=Last XPath result summary; currently selected element count as text|3|2
NodeValue=Last current element text value|3|2
AttributeName=Current attribute name during attribute operations/enumeration|3|2
AttributeValue=Current attribute value during attribute operations/enumeration|3|2
AttributeListJson=JSON object with current element attributes|3|2
SavedXmlString=Serialized document from doSaveXmlToString|3|2
ErrorMessage=Last error text; NativeAOT errors use ERROR: CODE: message|3|2
ErrorCode=Last parsed error code|3|2
NodeInfoJson=JSON description of current node, attributes and child element summaries|3|2
BridgeInfo=JSON metadata for loaded NativeAOT DLL and string ABI|3|2
NodeXml=Serialized current node or enumerated node|3|2
CurrentNodePath=Current node path built from element names and one-based sibling indexes|3|2
ResolvedNodePath=Canonical path resolved from NodePathIn, or current canonical path after path mutation|3|2
SelectedCount=Number of nodes in the current selected-node list|3|1
CurrentIndex=Zero-based index during selected-node enumeration or selection|3|1
AttributeCount=Number of attributes on the current element|3|1
AttributeIndex=Zero-based index during attribute enumeration|3|1
PathExists=1 when the last NodePath operation found or created a target, otherwise 0|3|1
SessionIDOut=Current native session handle; 0 means no active session|3|1

XmlStringIn=XML text for doLoadXmlString|4|2
FilePathIn=File path for load/save file operations|4|2
RootNameIn=Root element name for doCreateNewXml; may use a configured namespace prefix|4|2
XPathIn=XPath expression for select operations; use configured prefixes for namespaces|4|2
NodePathIn=Simple element path for NodePath operations, for example /root/items/item[2]/name|4|2
IndexIn=Zero-based index for doSelectByIndex|4|1
NewValueIn=New text value for doSetValue|4|2
AttributeNameIn=Attribute name; may use a configured namespace prefix or {uri}local form|4|2
AttributeValueIn=Attribute value for doSetAttributeValue|4|2
ChildNameIn=Child element name; may use a configured namespace prefix or {uri}local form|4|2
ChildXmlIn=XML element fragment appended by doAddChildXml|4|2
NodeXmlIn=XML element fragment replacing current node by doSetNodeXml|4|2
NamespacePrefixIn=Namespace prefix for XPath/name mapping|4|2
NamespaceUriIn=Namespace URI for XPath/name mapping; empty removes the prefix|4|2
NamespacesJsonIn=JSON object mapping prefixes to namespace URIs, for example {"x":"urn:test"}|4|2
FormattingIn=Runtime formatting override: 0 compact, 1 indented|4|1
DtdProcessingIn=Runtime DTD override: 0 prohibit, 1 ignore, 2 parse|4|1
MaxCharactersInDocumentIn=Runtime maximum XML characters while loading; 0 means unlimited|4|1
