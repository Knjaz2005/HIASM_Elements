[About]
Version=1.0
Author=Sergey Klimovich
Mail=Klimovich86@gmail.com

[Type]
Class=WinElement
Info=Браузер WebView2 для FPC/Delphi
Inherit=WinControl,WinSplitter
Interfaces=ControlManager

[Edit]
Class=WebBrowser

[Property]
Width=Ширина области браузера|1|400
Height=Высота области браузера|1|300
URL=Начальный URL. Используется при старте и как значение по умолчанию для doNavigate|2|about:blank
LoaderDLL=Путь к WebView2Loader.dll. Пусто - win-x32/win-x64 рядом с EXE|2|
BrowserExecutableFolder=Папка Fixed Version WebView2 Runtime. Пусто - системный Evergreen Runtime|2|
UserDataFolder=Папка профиля WebView2. Пусто - профиль по умолчанию|2|
Silent=Отключить стандартные JavaScript-диалоги|14|1|True,False
ContextMenu=Включить стандартное контекстное меню браузера|14|0|True,False
DevTools=Разрешить DevTools|14|0|True,False
PopupWindow=Разрешить отдельные popup-окна. False открывает разрешенные popup в текущем браузере|14|1|True,False
Zoom=Начальный масштаб, процентов|1|100
Theme=Тема WebView2: Auto, Light или Dark|4|0|Auto,Light,Dark

[Methods]
doNavigate=Перейти по URL из потока или свойства URL|1|
doRefresh=Перезагрузить текущую страницу|1|
doBack=Перейти назад по истории|1|
doForward=Перейти вперед по истории|1|
doFromText=Загрузить HTML из текста|1|
doFromFile=Загрузить HTML из файла FileName|1|
doGetPage=Асинхронно прочитать HTML текущей страницы|1|
doOpenDevTools=Открыть окно DevTools|1|
doZoom=Установить масштаб в процентах|1|
doTheme=Установить тему WebView2 из потока или свойства Theme|1|
doStop=Остановить текущую загрузку|1|
onNavigate=Событие при изменении текущего URL|2|
onTitle=Событие при изменении заголовка документа|2|
onStatus=Служебные сообщения WebView2 и текст ошибок|2|
onProgress=Прогресс навигации: 0 при старте и 65535 при завершении|2|
onLoad=Состояние загрузки: 1 при старте, 0 при завершении|2|
onError=Событие при ошибке WebView2|2|
onPage=HTML текущей страницы после doGetPage|2|
onNewWindow=Событие при запросе нового окна|2|
CurrentURL=Текущий URL|3|2
Page=Сохраненный HTML текущей страницы. Обновляется через doGetPage/onPage|3|2
Title=Текущий заголовок документа|3|2
BrowserVersion=Версия WebView2 Runtime|3|2
LastError=Последний текст ошибки WebView2|3|2
URL=URL для doNavigate|4|2
Text=HTML-текст для doFromText|4|2
FileName=Путь к HTML-файлу для doFromFile|4|2
Zoom=Масштаб для doZoom, процентов|4|1
Theme=Тема для doTheme: 0 Auto, 1 Light, 2 Dark|4|1
Navigate=Вернуть 1, чтобы отменить переход|4|1
NewWindow=Вернуть 1, чтобы отменить запрос нового окна|4|1